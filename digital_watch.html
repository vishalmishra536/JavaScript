<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Watch</title>
    <style>
        body{
            margin:0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: center;
            background: url("https://images.unsplash.com/photo-1499002238440-d264edd596ec?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1470&q=80");
            background-size: cover;
            overflow: hidden;
        }
        h2{
            text-transform: uppercase;
            font-size: 20px;
            letter-spacing: 4px;
            text-align: center;
            color:white;
        }
        .clock{
            display: flex;
        }
        .clock div{
            margin: 5px;
            position: relative;
        }
        .clock .text{
            height: 30px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: darkblue;
            opacity: 0.8;
        }
        .clock span{
            width: 100px;
            height: 80px;
            background: steelblue;
            opacity: 0.8;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            text-shadow: 2px 2px 4pc rgba(0,0,0,0.3);
        }
        .clock #ampm{
            width: 60px;
            height: 30px;
            font-size: 20px;
            position: absolute;
            background: green;
            bottom: 0;

        }
    </style>
</head>
<body>
    <h2>Digital Watch</h2>
    <div class="clock">
        <div>
        <span id="hour">00</span>
        <span class="text">Hours</span>
    </div>
    <div>
        <span id="minute">00</span>
        <span class="text">Minute</span>
    </div>
    <div>
    <span id="second">00</span>
    <span class="text">Second</span>
    </div>
    <div>
        <span id="ampm">AM</span>
    </div>
    </div>

    <script>
        const hourE1 = document.getElementById("hour");
        const minutesE1 = document.getElementById("minute");
        const secondE1 = document.getElementById("second");
        const ampmE1 = document.getElementById("ampm");

        function updateClock (){
            let h = new Date().getHours();
            let m = new Date().getMinutes();
            let s = new Date().getSeconds();
            let ampm = "AM";

            if(h > 12){
                h = h-12;
                ampm = "PM";
            }

            h = h < 10 ? "0" + h : h;
            m = m < 10 ? "0" + m : m;
            s = s < 10 ? "0" + s : s;

            hourE1.innerText = h;
            minutesE1.innerText = m;
            secondE1.innerText = s;
            ampmE1.innerText = ampm;
            setTimeout(() => {
                updateClock();
            }, 1000);
        }
        updateClock();
    </script>
</body>
</html>
